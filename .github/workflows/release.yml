name: release

# Changesets-driven release. On push to main this either opens/updates a
# "Version Packages" PR (when unreleased changesets exist) or, once that PR is
# merged, publishes the bumped packages to npm. Only @driftwatch/sdk is public;
# the server, console, and workspace root stay private and are never published.
on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the version PR / push tags
      pull-requests: write # open the "Version Packages" PR
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      - name: install
        run: pnpm install --frozen-lockfile
      - name: create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm changeset:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
