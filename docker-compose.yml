# Standalone deployment — DriftWatch + Redis, no external services required.
# This is the file platforms that auto-deploy a repo's docker-compose.yml
# (Coolify, Railway, plain `docker compose up -d`, ...) will pick up.
#
# OpenTelemetry export is optional. Point OTEL_EXPORTER_OTLP_ENDPOINT and
# SIGNOZ_URL at a collector/query-service you already run elsewhere; left at
# their localhost defaults (unreachable inside the container) the exporter
# just logs failures and the server keeps running normally. To run DriftWatch
# on the same network as a self-hosted SigNoz instead, see
# docker-compose.signoz.yml.
services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--maxmemory-policy", "noeviction"]
    volumes:
      - driftwatch-redis:/data
    restart: unless-stopped

  driftwatch:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4318}
      SIGNOZ_URL: ${SIGNOZ_URL:-http://localhost:8080}
      SIGNOZ_API_KEY: ${SIGNOZ_API_KEY:-}
      # --- model client (Qwen Cloud, OpenAI-compatible) ---
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      MODEL: ${MODEL:-qwen-max}
      AUTH_TOKEN: ${AUTH_TOKEN:-}
      # --- shared state (multi-process): point autopilot at the Redis above ---
      REDIS_URL: redis://redis:6379
      # --- autopilot (drift-triggered remediation loop) ---
      AUTOPILOT_ENABLED: ${AUTOPILOT_ENABLED:-0}
      AUTOPILOT_MODE: ${AUTOPILOT_MODE:-shadow}
      AUTOPILOT_SCAN_INTERVAL_MS: ${AUTOPILOT_SCAN_INTERVAL_MS:-60000}
      AUTOPILOT_APPROVAL_TIMEOUT_MS: ${AUTOPILOT_APPROVAL_TIMEOUT_MS:-600000}
      AUTOPILOT_POLICIES: ${AUTOPILOT_POLICIES:-}
      # --- notification / approval channels ---
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_SECRET_TOKEN: ${TELEGRAM_SECRET_TOKEN:-}
      DRIFT_WEBHOOK_URL: ${DRIFT_WEBHOOK_URL:-}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  driftwatch-redis:
