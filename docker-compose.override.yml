# Drop this into the SigNoz self-host repo's deploy/docker directory (or merge
# into your own compose) so your agent runs on the same network as the SigNoz
# OTel collector. Then the OTLP endpoint is the collector's service name, not
# localhost.
#
#   git clone https://github.com/SigNoz/signoz
#   cd signoz/deploy/docker
#   docker compose up -d           # brings up SigNoz (UI on :8080)
#   docker compose -f docker-compose.yaml -f docker-compose.override.yml up -d
services:
  agent-drift-watch:
    build: ../../agent-drift-watch   # adjust to where you cloned this
    environment:
      # collector service name inside the SigNoz compose network:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      SIGNOZ_URL: http://query-service:8080
      SIGNOZ_API_KEY: ${SIGNOZ_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - otel-collector
